<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blok Space</title>
  <link rel="icon" href="/Images/Surveillance.png">
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700&display=swap");
    :root {
      --text-size: clamp(19px, 3.57vmin, 48px);
      --cypher-green: #ff7a00;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
    }

    body {
      overflow: hidden;
      background: #000;
      display: grid;
      place-items: center;
      font-family: "Consolas", "Lucida Console", monospace;
      position: relative;
    }

    #matrix {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    body.loading-lite #matrix {
      display: none;
    }

    .loading-stage {
      position: relative;
      z-index: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: clamp(12px, 3.2vw, 28px);
      width: 100%;
      min-height: 100vh;
    }

    .loading-text {
      position: relative;
      min-height: 1.25em;
      color: var(--cypher-green);
      font-family: "Orbitron", "Consolas", "Lucida Console", monospace;
      font-size: var(--text-size);
      letter-spacing: 0.22em;
      text-transform: uppercase;
      text-align: center;
      text-shadow:
        0 0 8px rgba(255, 145, 0, 0.9),
        0 0 22px rgba(255, 120, 0, 0.62),
        0 0 38px rgba(255, 84, 0, 0.36);
      white-space: nowrap;
      line-height: 1.2;
      max-width: 100%;
      animation: caret 0.9s steps(1, end) infinite;
      border-right: 0.12em solid rgba(255, 140, 0, 0.95);
      padding-right: 0.2em;
    }

    .loading-text.done {
      animation: none;
      border-right-color: transparent;
    }

    .loading-text::before,
    .loading-text::after {
      content: attr(data-text);
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
    }

    .loading-text.glitching::before {
      color: #ffd7ad;
      transform: translate(2px, -1px);
      opacity: 0.72;
      text-shadow: -2px 0 rgba(255, 195, 132, 0.78);
      animation: glitch-a 0.48s infinite steps(2, end);
    }

    .loading-text.glitching::after {
      color: #ff9300;
      transform: translate(-2px, 1px);
      opacity: 0.66;
      text-shadow: 2px 0 rgba(255, 128, 0, 0.82);
      animation: glitch-b 0.38s infinite steps(2, end);
    }

    @keyframes caret {
      50% {
        border-right-color: transparent;
      }
    }

    @keyframes glitch-a {
      0%,
      9%,
      46%,
      100% {
        clip-path: inset(0 0 0 0);
      }
      10% {
        clip-path: inset(2% 0 78% 0);
      }
      18% {
        clip-path: inset(66% 0 12% 0);
      }
      27% {
        clip-path: inset(36% 0 38% 0);
      }
      34% {
        clip-path: inset(82% 0 2% 0);
      }
      41% {
        clip-path: inset(12% 0 60% 0);
      }
    }


    @keyframes glitch-b {
      0%,
      8%,
      54%,
      100% {
        clip-path: inset(0 0 0 0);
      }
      11% {
        clip-path: inset(68% 0 8% 0);
      }
      19% {
        clip-path: inset(8% 0 74% 0);
      }
      29% {
        clip-path: inset(48% 0 26% 0);
      }
      37% {
        clip-path: inset(20% 0 52% 0);
      }
      46% {
        clip-path: inset(74% 0 6% 0);
      }
    }

    body.loading-lite .loading-text {
      text-shadow:
        0 0 6px rgba(255, 145, 0, 0.85),
        0 0 14px rgba(255, 120, 0, 0.45);
      animation-duration: 1.2s;
    }

    body.loading-lite .loading-text.glitching::before {
      animation: glitch-a 1.2s infinite steps(1, end);
      opacity: 0.46;
    }

    body.loading-lite .loading-text.glitching::after {
      animation: glitch-b 1.06s infinite steps(1, end);
      opacity: 0.42;
    }

  </style>
</head>
<body>
  <canvas id="matrix"></canvas>

  <div class="loading-stage">
    <div id="loadingText" class="loading-text" data-text="" aria-live="polite"></div>
  </div>

  <script>
    const canvas = document.getElementById("matrix");
    const ctx = canvas.getContext("2d", { alpha: false });
    const reducedMotionQuery = window.matchMedia ? window.matchMedia("(prefers-reduced-motion: reduce)") : null;
    const coarsePointerQuery = window.matchMedia ? window.matchMedia("(pointer: coarse)") : null;
    const narrowViewportQuery = window.matchMedia ? window.matchMedia("(max-width: 900px)") : null;
    const pixelRatio = window.devicePixelRatio || 1;
    let constrainedDevice = false;
    let matrixEnabled = true;
    let fontSize = 18;
    let matrixFrameIntervalMs = 24;
    let lastMatrixPaintTime = 0;
    const glyphs = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789<>$#@%&";
    let columns = 0;
    let drops = [];
    let speeds = [];
    let matrixRafId = 0;

    function isConstrainedDevice() {
      return Boolean(
        (reducedMotionQuery && reducedMotionQuery.matches)
        || (coarsePointerQuery && coarsePointerQuery.matches)
        || (narrowViewportQuery && narrowViewportQuery.matches)
        || pixelRatio >= 2.5
      );
    }

    function resetMatrix() {
      constrainedDevice = isConstrainedDevice();
      matrixEnabled = !constrainedDevice;
      document.body.classList.toggle("loading-lite", constrainedDevice);

      if (!matrixEnabled) {
        stopMatrixLoop();
        canvas.width = 1;
        canvas.height = 1;
        columns = 0;
        drops = [];
        speeds = [];
        return;
      }

      const renderScale = constrainedDevice ? 0.62 : 1;
      canvas.width = Math.max(1, Math.floor(window.innerWidth * renderScale));
      canvas.height = Math.max(1, Math.floor(window.innerHeight * renderScale));
      fontSize = constrainedDevice ? 22 : 18;
      matrixFrameIntervalMs = constrainedDevice ? 54 : 24;
      lastMatrixPaintTime = 0;
      columns = Math.ceil(canvas.width / fontSize);
      drops = Array.from({ length: columns }, () => Math.random() * (canvas.height / fontSize));
      speeds = Array.from({ length: columns }, () => constrainedDevice ? 0.5 + Math.random() * 0.85 : 0.65 + Math.random() * 1.35);
    }

    function drawMatrix(time = 0) {
      if (!matrixEnabled) {
        matrixRafId = 0;
        return;
      }

      if (lastMatrixPaintTime && (time - lastMatrixPaintTime) < matrixFrameIntervalMs) {
        matrixRafId = requestAnimationFrame(drawMatrix);
        return;
      }

      lastMatrixPaintTime = time;
      ctx.fillStyle = constrainedDevice ? "rgba(0, 0, 0, 0.12)" : "rgba(0, 0, 0, 0.05)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "#0f0";
      ctx.font = `${fontSize}px "Consolas", "Lucida Console", monospace`;
      ctx.textBaseline = "top";

      for (let i = 0; i < columns; i += 1) {
        const char = glyphs[Math.floor(Math.random() * glyphs.length)];
        const x = i * fontSize;
        const y = Math.floor(drops[i]) * fontSize;

        ctx.fillText(char, x, y);
        drops[i] += speeds[i] * 0.35;

        if (y > canvas.height && Math.random() > 0.976) {
          drops[i] = 0;
        }
      }

      matrixRafId = requestAnimationFrame(drawMatrix);
    }

    function startMatrixLoop() {
      if (matrixRafId !== 0) return;
      lastMatrixPaintTime = 0;
      matrixRafId = requestAnimationFrame(drawMatrix);
    }

    function stopMatrixLoop() {
      if (matrixRafId === 0) return;
      cancelAnimationFrame(matrixRafId);
      matrixRafId = 0;
    }

    resetMatrix();
    window.addEventListener("resize", resetMatrix);

    const loadingText = document.getElementById("loadingText");
    const message = "LOADING BLOK SPACE...";
    const scramble = "ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#$%";

    function updateAnimationVisibility() {
      if (document.hidden || !matrixEnabled) {
        stopMatrixLoop();
        return;
      }
      startMatrixLoop();
    }

    function setLoadingText(value) {
      loadingText.textContent = value;
      loadingText.setAttribute("data-text", value);
    }

    function randomScrambleChar() {
      return scramble[Math.floor(Math.random() * scramble.length)];
    }

    let index = 0;

    function typeLoadingText() {
      if (index <= message.length) {
        const typed = message.slice(0, index);
        const preview = index < message.length ? randomScrambleChar() : "";
        setLoadingText(typed + preview);
        index += 1;
        setTimeout(typeLoadingText, index < 5 ? 110 : 70);
        return;
      }

      setLoadingText(message);
      loadingText.classList.add("done");
      if (!(reducedMotionQuery && reducedMotionQuery.matches)) {
        loadingText.classList.add("glitching");
      }
    }

    document.addEventListener("visibilitychange", updateAnimationVisibility);
    window.addEventListener("pagehide", () => {
      stopMatrixLoop();
    }, { once: true });

    updateAnimationVisibility();
    typeLoadingText();
  </script>
</body>
</html>
